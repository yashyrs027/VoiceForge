# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"

reviews:
  profile: "assertive"
  request_changes_workflow: false

  # Summary goes into the walkthrough comment, not the PR description body
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  poem: false

  high_level_summary_instructions: |
    Please format the review summary exactly as follows:

    ## 🔍 PR Review

    ### 📋 What this PR does
    (Brief summary in 2-3 lines of what the PR accomplishes)

    ### ✅ Should I merge?
    (Give a clear YES / NO / MERGE AFTER FIXES verdict with a one-line reason)

    ### 🚨 Required Changes (Blockers)
    For every issue that MUST be fixed before merging, use this format.
    If there are no blockers, write: "No blocking changes required."
    - **File:** `filename.ext` — Line X
    - **Current code:**
      ```
      (exact problematic code)
      ```
    - **Replace with:**
      ```
      (exact fixed code)
      ```
    - **Why:** (one line explanation)

    ### 💡 Suggestions (Optional but Recommended)
    For every non-blocking improvement, use this format.
    If there are no suggestions, write: "No optional suggestions."
    - **File:** `filename.ext` — Line X
    - **Current code:**
      ```
      (exact problematic code)
      ```
    - **Replace with:**
      ```
      (exact fixed code)
      ```
    - **Why:** (one line explanation)

    ### 🏁 Verdict
    - [ ] Merge as-is
    - [ ] Merge after fixing required changes
    - [ ] Do not merge (major issues)

  # Auto-review is ON — CodeRabbit automatically reviews PRs when opened.
  # It will run automatically on non-draft PRs targeting the main branch.
  auto_review:
    enabled: true
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 0
    drafts: false          # skip draft PRs
    base_branches:
      - "main"             # only review PRs targeting main branch

  # Exclude generated files, lockfiles, binary assets and built output
  # to cut token usage and keep reviews focused on real code changes
  path_filters:
    - "!package-lock.json"
    - "!node_modules/**"
    - "!dist/**"
    - "!public/models/**"
    - "!models/**"
    - "!**/*.onnx"
    - "!**/*.bin"

  path_instructions:
    # ── Global VoiceForge checks applied to every reviewed file ──────────────
    - path: "**"
      instructions: |
        Apply the following checks to every file in this PR:

        1. VoiceForge audio / media checks:
           - Flag audio buffer handling errors (e.g. reading from a closed or detached buffer).
           - Flag async/await mistakes in voice or audio processing (missing await, unhandled Promise rejections).
           - Flag missing cleanup on audio streams (MediaStream tracks not stopped, AudioContext not closed).
           - Flag Web Audio API usage that is incompatible with Chrome or Edge
             (VoiceForge targets Chrome and Edge only — Firefox / Safari are explicitly unsupported).
           - Flag memory leaks in audio nodes: AnalyserNode and MediaStreamSourceNode must be
             disconnected before their AudioContext is closed; createObjectURL blobs must be
             revoked via URL.revokeObjectURL when no longer needed.
           - Flag missing error handling on navigator.mediaDevices.getUserMedia and
             navigator.mediaDevices.enumerateDevices calls.

        2. Security checks:
           - Flag any hardcoded ElevenLabs API keys, Bearer tokens, or other credentials.
           - Flag secrets committed in environment files that should be in .env.example only.

    # ── Server-side Express / Node.js ────────────────────────────────────────
    - path: "server/**/*.js"
      instructions: |
        1. Confirm every async route handler passes errors to next(err) — never swallows them silently.
        2. Verify that the X-ElevenLabs-Api-Key header is validated and sanitised before use.
        3. Check that streaming response bodies (ElevenLabs TTS stream) are properly piped and
           that the reader is cancelled when the client disconnects (request 'close' event).
        4. Confirm CORS is locked to the configured CLIENT_URL origin and not open to *.
        5. Check that in-memory stores (pendingStreams Map) have bounded size and TTL eviction.

    # ── React client components ───────────────────────────────────────────────
    - path: "client/src/**/*.jsx"
      instructions: |
        1. Verify useEffect dependency arrays are complete — missing deps cause stale closures
           in audio/camera hooks and canvas animation loops.
        2. Confirm every useEffect that starts a requestAnimationFrame loop returns a cleanup
           function that calls cancelAnimationFrame.
        3. Confirm every useEffect that opens a MediaStream returns a cleanup function that
           stops all tracks.
        4. Check ARIA attributes on dynamic elements (recording status, audio playback state,
           live camera indicator) so screen-reader users receive correct announcements.
        5. Ensure forwardRef components expose the ref to the correct DOM element (e.g. canvas
           in VideoPreview).

    # ── React custom hooks ────────────────────────────────────────────────────
    - path: "client/src/hooks/**/*.js"
      instructions: |
        1. Confirm the hook returns a stable cleanup interface — callers must be able to
           stop/destroy resources from the component that owns the hook.
        2. Verify AudioContext instances are created inside an effect, not at module level,
           to avoid exceeding the browser's AudioContext limit (6 concurrent contexts in Chrome).
        3. Check that object URL blobs created with URL.createObjectURL are revoked on
           unmount or when a new URL replaces the previous one.

    # ── GitHub Actions workflows ──────────────────────────────────────────────
    - path: ".github/workflows/**"
      instructions: |
        1. Flag any step that uses a third-party Action without pinning to a full commit SHA
           (e.g. uses: actions/checkout@v4 should be pinned to a SHA for supply-chain safety).
        2. Flag secrets referenced directly in run: commands (use ${{ secrets.NAME }} correctly).
        3. Verify workflow triggers do not expose secrets to pull_request_target events from
           untrusted forks.

  # ── Static analysis tools ─────────────────────────────────────────────────
  tools:
    eslint:
      enabled: true
    dotenvLint:
      enabled: true
    actionlint:
      enabled: true
    zizmor:
      enabled: true
    # Primary secret scanner
    gitleaks:
      enabled: true
    # Secondary secret scanner with verification — catches live/valid credentials
    trufflehog:
      enabled: true

chat:
  auto_reply: true
