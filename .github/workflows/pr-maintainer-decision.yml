name: PR Maintainer Decision

on:
  pull_request_target:
    types: [labeled, review_requested]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-maintainer-decision-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  decide:
    if: github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest

    steps:
      - name: Apply PR maintainer decision
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = pr.number;
            const username = pr.user.login;
            const labels = (pr.labels || []).map(label => label.name);
            const normalizedLabels = labels.map(label => label.toLowerCase());

            const labelDefinitions = {
              'invalid-pr': 'D93F0B',
              'needs revision': 'FBCA04',
              'ready for review': '0E8A16',
              closed: '6A737D'
            };

            async function actorCanMakeMaintainerDecision() {
              try {
                const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner,
                  repo,
                  username: context.actor
                });
                return ['admin', 'maintain', 'write'].includes(data.permission);
              } catch (error) {
                core.warning(`Could not verify maintainer permission for @${context.actor}: ${error.message}`);
                return false;
              }
            }

            async function ensureLabel(name) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status === 404) {
                  try {
                    await github.rest.issues.createLabel({
                      owner,
                      repo,
                      name,
                      color: labelDefinitions[name] || 'EDEDED'
                    });
                  } catch (createError) {
                    if (createError.status === 403) {
                      core.warning(`Could not create label "${name}": ${createError.message}`);
                      return;
                    }
                    throw createError;
                  }
                } else {
                  throw error;
                }
              }
            }

            async function addLabels(names) {
              for (const name of names) await ensureLabel(name);
              try {
                await github.rest.issues.addLabels({ owner, repo, issue_number, labels: names });
              } catch (error) {
                if (error.status === 403) {
                  core.warning(`Could not add labels "${names.join(', ')}" to PR #${issue_number}: ${error.message}`);
                  return;
                }
                throw error;
              }
            }

            async function removeLabel(name) {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
              } catch (error) {
                if (error.status === 403) {
                  core.warning(`Could not remove label "${name}" from PR #${issue_number}: ${error.message}`);
                  return;
                }
                if (error.status !== 404) throw error;
              }
            }

            async function createOrUpdateComment(marker, body) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100
              });
              const existing = comments.find(comment =>
                comment.user.type === 'Bot' &&
                comment.body &&
                comment.body.includes(marker)
              );

              try {
                if (existing) {
                  if (existing.body.trim() === body.trim()) return;
                  await github.rest.issues.updateComment({
                    owner,
                    repo,
                    comment_id: existing.id,
                    body
                  });
                } else {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number,
                    body
                  });
                }
              } catch (error) {
                if (error.status === 403) {
                  core.warning(`Could not write PR maintainer decision comment: ${error.message}`);
                  return;
                }
                throw error;
              }
            }

            async function hasAutomationWarning() {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100
              });
              return comments.some(comment =>
                comment.user.type === 'Bot' &&
                comment.body &&
                (
                  (comment.body.includes('<!-- voiceforge-pr-template-validator -->') && comment.body.includes('## PR Update Needed')) ||
                  (comment.body.includes('<!-- voiceforge-pr-template-validator -->') && comment.body.includes('## PR Needs A Quick Update')) ||
                  (comment.body.includes('<!-- voiceforge-pr-template-validator -->') && comment.body.includes('## PR Needs Updates')) ||
                  comment.body.includes('<!-- voiceforge-pr-invalid-warning -->')
                )
              );
            }

            const canDecide = await actorCanMakeMaintainerDecision();
            if (!canDecide) {
              core.warning(`Ignoring PR maintainer decision because @${context.actor} does not have write, maintain, or admin permission.`);
              return;
            }

            if (context.eventName === 'pull_request_review' && context.payload.review?.state === 'changes_requested') {
              await addLabels(['needs revision']);
              await removeLabel('ready for review');
              const marker = '<!-- voiceforge-pr-needs-revision -->';
              const body =
                `${marker}\n` +
                `## 🔄 Changes Requested\n\n` +
                `Hey @${username}! 👋 A mentor has reviewed your PR and requested some changes.\n\n` +
                `> [!WARNING]\n` +
                `> Please review the feedback above, update this same branch, and keep the PR focused on the linked issue.\n\n` +
                `Once you push your updates, the review flow will continue automatically on this same PR.\n\n` +
                `---\n` +
                `<sub>🤖 VoiceForge Automation · *Updates automatically on edits*</sub>`;
              await createOrUpdateComment(marker, body);
              return;
            }

            if (!normalizedLabels.includes('invalid-pr')) return;

            if (!(await hasAutomationWarning())) {
              const warningMarker = '<!-- voiceforge-pr-invalid-warning -->';
              const warningBody =
                `${warningMarker}\n` +
                `## ⚠️ Invalid PR — Action Required\n\n` +
                `Hey @${username}! 👋 A maintainer has marked this PR as \`invalid-pr\`.\n\n` +
                `> [!WARNING]\n` +
                `> Before this PR is closed, please check and fix the following:\n` +
                `> - ✅ PR template is complete\n` +
                `> - ✅ Linked issue exists and has the correct program label\n` +
                `> - ✅ The linked issue is assigned to you\n` +
                `> - ✅ PR title follows the correct format\n\n` +
                `If the issues are not resolved, a maintainer may close this PR.\n\n` +
                `---\n` +
                `<sub>🤖 VoiceForge Automation · *Updates automatically on edits*</sub>`;
              await createOrUpdateComment(warningMarker, warningBody);
              return;
            }

            const marker = '<!-- voiceforge-pr-invalid-close -->';
            const body =
              `${marker}\n` +
              `## 🚫 PR Closed by Maintainer\n\n` +
              `Hey @${username}! 👋 Thanks for your contribution.\n\n` +
              `> [!CAUTION]\n` +
              `> This PR has been closed because it was marked as \`invalid-pr\` and the issues were not resolved.\n\n` +
              `Please fix the template, linked issue, assignee, and title requirements — then open a fresh PR. If you believe this was a mistake, reach out to a maintainer before reopening.\n\n` +
              `---\n` +
              `<sub>🤖 VoiceForge Automation · *Updates automatically on edits*</sub>`;

            await createOrUpdateComment(marker, body);
            await addLabels(['closed']);
            await removeLabel('ready for review');

            if (pr.state !== 'closed') {
              try {
                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: issue_number,
                  state: 'closed'
                });
              } catch (error) {
                if (error.status === 403) {
                  core.warning(`Could not close PR #${issue_number}: ${error.message}`);
                  return;
                }
                throw error;
              }
            }
