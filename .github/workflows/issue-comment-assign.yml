name: Issue Assignment Request

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

concurrency:
  group: issue-comment-assign-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  request-assignment:
    if: |
      github.event.issue.pull_request == null &&
      github.event.issue.state == 'open' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Respond to assignment request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const comment = context.payload.comment;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;
            const username = comment.user.login;

            function isAssignmentRequest(text) {
              const normalized = (text || '')
                .toLowerCase()
                .replace(/\s+/g, ' ')
                .trim();

              const requestPatterns = [
                /^-assign$/,
                /^\/assign$/,
                /\bassign me\b/,
                /\bassign it to me\b/,
                /\bassign this issue to me\b/,
                /\bplease assign\b/,
                /\bcan you assign\b/,
                /\bcould you assign\b/,
                /\bkindly assign\b/,
                /\bi want to work on this\b/,
                /\bi would like to work on this\b/,
                /\bi'd like to work on this\b/,
                /\bcan i work on this\b/,
                /\bmay i work on this\b/,
                /\bi am interested in working on this\b/,
                /\bi'm interested in working on this\b/
              ];

              return requestPatterns.some(pattern => pattern.test(normalized));
            }

            if (!isAssignmentRequest(comment.body)) {
              return;
            }

            if ((issue.assignees || []).length > 0) {
              const assigned = issue.assignees.map(assignee => `@${assignee.login}`).join(', ');
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: `## 👥 Issue Already Assigned\n\n> [!WARNING]\n> This issue already has an assignee — please do not start work unless a maintainer reassigns it to you.\n\nHey @${username}! 👋 Thanks for offering to help.\n\nThis issue is currently assigned to ${assigned}. Your interest is noted and visible to maintainers.\n\nWhile you wait, feel free to explore other open issues — we'd love to have your contribution elsewhere! 🚀\n\n---\n<sub>🤖 VoiceForge Automation</sub>`
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: `## 🙋 Assignment Request Received\n\n> [!TIP]\n> A maintainer will review your request and assign you if approved.\n\nHey @${username}! 🎉 Thanks for volunteering — your request is now visible to maintainers.\n\n⚠️ **Please wait for an official assignment before starting any work.**\n\nIn the meantime, feel free to explore other open issues! 🔍\n\n---\n<sub>🤖 VoiceForge Automation</sub>`
            });
