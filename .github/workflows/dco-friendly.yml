name: Friendly DCO Check

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: dco-friendly-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dco:
    if: github.event.pull_request.draft == false && github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest

    steps:
      - name: Check commit sign-offs without blocking
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = pr.number;
            const username = pr.user.login;

            const labels = {
              'dco-missing': 'D93F0B',
              'dco-verified': '0E8A16'
            };

            async function ensureLabel(name) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status === 404) {
                  try {
                    await github.rest.issues.createLabel({
                      owner,
                      repo,
                      name,
                      color: labels[name]
                    });
                  } catch (createError) {
                    if (createError.status === 403) {
                      core.warning(`Could not create label "${name}": ${createError.message}`);
                      return;
                    }
                    throw createError;
                  }
                } else {
                  throw error;
                }
              }
            }

            async function addLabel(name) {
              await ensureLabel(name);
              try {
                await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [name] });
              } catch (error) {
                if (error.status === 403) {
                  core.warning(`Could not add label "${name}": ${error.message}`);
                  return;
                }
                throw error;
              }
            }

            async function removeLabel(name) {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
              } catch (error) {
                if (error.status === 403) {
                  core.warning(`Could not remove label "${name}": ${error.message}`);
                  return;
                }
                if (error.status !== 404) throw error;
              }
            }

            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner,
              repo,
              pull_number: issue_number,
              per_page: 100
            });

            const signoffRegex = /^Signed-off-by:\s+.+\s+<[^<>]+>\s*$/im;
            const invalidCommits = commits
              .filter(commit => !signoffRegex.test(commit.commit.message || ''))
              .map(commit => ({
                sha: commit.sha.substring(0, 7),
                title: (commit.commit.message || '').split('\n')[0]
              }));

            const missingDco = invalidCommits.length > 0;
            if (missingDco) {
              await addLabel('dco-missing');
              await removeLabel('dco-verified');
            } else {
              await addLabel('dco-verified');
              await removeLabel('dco-missing');
            }

            const marker = '<!-- voiceforge-dco-friendly -->';
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body &&
              comment.body.includes(marker)
            );

            const body = missingDco
              ? `${marker}\n## ✍️ DCO Sign-off Needed\n\nHey @${username}! 👋 One or more commits in this PR are missing a \`Signed-off-by:\` line.\n\n> [!WARNING]\n${invalidCommits.map(commit => `> - \`${commit.sha}\` ${commit.title}`).join('\n')}\n\n**How to fix:**\n\nFor the latest commit:\n\n\`\`\`bash\ngit commit --amend --signoff\ngit push --force-with-lease\n\`\`\`\n\nFor multiple commits, replace \`N\` with the number to update:\n\n\`\`\`bash\ngit rebase --signoff HEAD~N\ngit push --force-with-lease\n\`\`\`\n\nThis comment will update automatically after you push.\n\n---\n<sub>🤖 VoiceForge Automation · *Updates automatically on edits*</sub>`
              : `${marker}\n## ✅ DCO Verified\n\nHey @${username}! 👋 All commits include a valid \`Signed-off-by:\` line.\n\n> [!NOTE]\n> Your PR can continue through the normal review process.\n\n---\n<sub>🤖 VoiceForge Automation · *Updates automatically on edits*</sub>`;

            if (existing && existing.body.trim() === body.trim()) return;

            if (existing) {
              try {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body
                });
              } catch (error) {
                if (error.status === 403) core.warning(`Could not update DCO comment: ${error.message}`);
                else throw error;
              }
            } else {
              try {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body
                });
              } catch (error) {
                if (error.status === 403) core.warning(`Could not create DCO comment: ${error.message}`);
                else throw error;
              }
            }
