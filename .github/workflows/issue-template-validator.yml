name: Issue Template Validator

on:
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write

concurrency:
  group: issue-template-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event.issue.pull_request == null && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Validate issue template and labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;
            const username = issue.user.login;
            const body = issue.body || '';

            const labelDefinitions = {
              gssoc26: '0E8A16',
              nsoc26: '1D76DB',
              SSoC26: '5319E7',
              ELUSOC: 'FBCA04',
              bug: 'D73A4A',
              enhancement: 'A2EEEF',
              duplicate: 'CFD3D7',
              'not needed': 'D93F0B',
              'out of scope': 'D93F0B',
              'go ahead': '0E8A16',
              'needs maintainer review': 'FBCA04',
              'ready to work': '0E8A16',
              'stale-assignment': 'D93F0B',
              'priority: low': 'C2E0C6',
              'priority: medium': 'FBCA04',
              'priority: high': 'D93F0B',
              'level: easy': 'C2E0C6',
              'level: medium': 'FBCA04',
              'level: hard': 'D93F0B',
              'needs-template': 'B60205',
              'needs-quality': 'D4C5F9'
            };

            async function ensureLabel(name) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name,
                    color: labelDefinitions[name] || 'EDEDED'
                  });
                } else {
                  throw error;
                }
              }
            }

            async function addLabels(labels) {
              for (const label of labels) await ensureLabel(label);
              if (labels.length > 0) {
                await github.rest.issues.addLabels({ owner, repo, issue_number, labels });
              }
            }

            async function removeLabel(name) {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }

            function getProgramReviewerMentions(programLabel) {
              const reviewersByProgram = {
                gssoc26: ['@sabeenaviklar', '@1754riya', '@Anushreebasics', '@itsdakshjain'],
                nsoc26: ['@joyprakashk', '@rushi-k12'],
                SSoC26: ['@joyprakashk', '@rushi-k12'],
                ELUSOC: ['@joyprakashk', '@rushi-k12']
              };
              return [...new Set(reviewersByProgram[programLabel] || [])];
            }

            async function issueAuthorCanSelfReview() {
              try {
                const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner,
                  repo,
                  username
                });
                return ['admin', 'maintain', 'write'].includes(data.permission);
              } catch (error) {
                core.warning(`Could not verify issue author permission for @${username}: ${error.message}`);
                return false;
              }
            }

            for (const label of ['duplicate', 'not needed', 'out of scope', 'go ahead', 'needs maintainer review', 'ready to work', 'stale-assignment', 'priority: low', 'priority: medium', 'priority: high', 'level: easy', 'level: medium', 'level: hard']) {
              await ensureLabel(label);
            }

            const programs = [
              { name: 'GSSoC', label: 'gssoc26', patterns: [/\bGSSOC(?:\s*['-]?\s*26|\s*2026)?\b/i, /\bGirlScript\s+Summer\s+of\s+Code\b/i] },
              { name: 'NSOC', label: 'nsoc26', patterns: [/\bNSOC(?:\s*['-]?\s*26|\s*2026)?\b/i] },
              { name: 'SSOC', label: 'SSoC26', patterns: [/\bSSOC(?:\s*['-]?\s*26|\s*2026)?\b/i] },
              { name: 'ELUSOC', label: 'ELUSOC', patterns: [/\bELU\s*-?\s*SOC\b/i, /\bELUSOC(?:\s*['-]?\s*26|\s*2026)?\b/i] }
            ];

            function hasHeading(name) {
              const escapedName = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              return new RegExp(`^\\s*#{1,6}\\s*.*${escapedName}\\b`, 'im').test(body);
            }
            function getHeadingSection(name) {
              const escapedName = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const sectionMatch = body.match(new RegExp(`^\\s*#{1,6}\\s*.*${escapedName}\\b.*$`, 'im'));
              if (!sectionMatch || typeof sectionMatch.index !== 'number') return '';

              const sectionStart = sectionMatch.index + sectionMatch[0].length;
              const nextHeadingMatch = body.slice(sectionStart).match(/^\s*#{1,6}\s+.+$/m);
              const sectionEnd = nextHeadingMatch && typeof nextHeadingMatch.index === 'number'
                ? sectionStart + nextHeadingMatch.index
                : body.length;

              return body.slice(sectionStart, sectionEnd).replace(/<!--[\s\S]*?-->/g, '').trim();
            }

            const programSection = getHeadingSection('Program');
            const matchedPrograms = programs.filter(program =>
              program.patterns.some(pattern => pattern.test(programSection))
            );
            const matchedProgram = matchedPrograms.length === 1 ? matchedPrograms[0] : null;

            const isBugTemplate =
              hasHeading('Describe the bug') &&
              hasHeading('Steps to Reproduce') &&
              hasHeading('Expected Behavior') &&
              hasHeading('Actual Behavior');
            const isFeatureTemplate =
              hasHeading('Feature Description') &&
              hasHeading('Problem It Solves') &&
              hasHeading('Proposed Solution') &&
              hasHeading('Acceptance Criteria');

            function getCleanIssueBody(text) {
              return (text || '')
                .replace(/<!--[\s\S]*?-->/g, '')
                .replace(/---/g, '')
                .replace(/[#>*`\-\[\]]/g, '')
                .replace(/\.\.\./g, '')
                .trim();
            }

            function hasPlaceholderContent(text) {
              const cleaned = getCleanIssueBody(text).toLowerCase();
              const placeholders = [
                'a clear and concise description',
                'steps to reproduce the behavior',
                "go to '",
                "click on '",
                "scroll to '",
                'see error',
                'what actually happens instead',
                'if applicable, add screenshots',
                'add any other context',
                'browser: (e.g.',
                'device: (e.g.',
                'os: (e.g.',
                'what problem does this feature solve',
                'describe the solution you have in mind',
                'have you considered any alternative',
                'what does "done" look like'
              ];

              return placeholders.filter(placeholder => cleaned.includes(placeholder)).length >= 2;
            }

            const templateProblems = [];
            const qualityProblems = [];
            const labelsToAdd = [];

            if (!matchedProgram) {
              templateProblems.push(matchedPrograms.length > 1
                ? 'Please select only one program: GSSoC, NSOC, SSOC, or ELUSOC.'
                : 'Please select one program template: GSSoC, NSOC, SSOC, or ELUSOC.');
            }

            if (!isBugTemplate && !isFeatureTemplate) {
              templateProblems.push('Please use the mandatory bug report or feature request issue template.');
            }

            if (templateProblems.length === 0) {
              labelsToAdd.push(matchedProgram.label);
              labelsToAdd.push('needs maintainer review');
              if (isBugTemplate) labelsToAdd.push('bug');
              if (isFeatureTemplate) labelsToAdd.push('enhancement');
            }

            const cleanedBody = getCleanIssueBody(body);
            if (cleanedBody.length < 160 || hasPlaceholderContent(body)) {
              qualityProblems.push('Please replace the template placeholder text with enough real detail for maintainers to review this issue.');
              labelsToAdd.push('needs-quality');
            }

            if (templateProblems.length > 0) {
              labelsToAdd.push('needs-template');
              for (const program of programs) await removeLabel(program.label);
              await removeLabel('bug');
              await removeLabel('enhancement');
              await removeLabel('needs maintainer review');
              await removeLabel('ready to work');
            }

            await addLabels([...new Set(labelsToAdd)]);

            if (templateProblems.length === 0) {
              await removeLabel('needs-template');
            }

            if (qualityProblems.length === 0) {
              await removeLabel('needs-quality');
            }

            const problems = [...templateProblems, ...qualityProblems];

            const marker = '<!-- voiceforge-issue-template-validator -->';
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body &&
              comment.body.includes(marker)
            );

            if (problems.length === 0) {
              const authorCanSelfReview = await issueAuthorCanSelfReview();
              const reviewerMentions = authorCanSelfReview ? [] : getProgramReviewerMentions(matchedProgram.label);
              const reviewerMentionText = authorCanSelfReview
                ? `Skipped because @${username} has maintainer permissions`
                : reviewerMentions.length > 0 ? reviewerMentions.join(' ') : 'No mentor configured for this program yet';
              const reviewerRequestText = authorCanSelfReview
                ? `Maintainer-created issue: @${username} can review this directly, so no program mentor ping was sent.\n\n` +
                  `Maintainer next steps: add priority/difficulty labels, choose a decision label, then assign only when ready.\n\n`
                : reviewerMentions.length > 0
                  ? `${reviewerMentionText}, this ${matchedProgram.name} issue is ready for review.\n\n` +
                  `Mentor next steps: confirm scope, add priority/difficulty if needed, then apply \`go ahead\`, \`duplicate\`, \`not needed\`, or \`out of scope\`.\n\n`
                  : `No mentor is configured for ${matchedProgram.name} yet, so no mentor ping was sent.\n\n`;
              const successBody =
                `${marker}\n` +
                `${authorCanSelfReview ? '## Maintainer Issue Intake Passed' : '## Issue Ready For Mentor Review'}\n\n` +
                `Hi @${username}, your ${matchedProgram.name} ${isBugTemplate ? 'bug report' : 'feature request'} passed intake.\n\n` +
                `${authorCanSelfReview ? 'Labels were applied without a mentor ping because this was opened by a maintainer.' : 'A mentor will review scope, labels, and assignment readiness next.'}\n\n` +
                reviewerRequestText +
                `${authorCanSelfReview ? 'Contributors should still wait for maintainer assignment before starting work.' : 'Please wait for mentor confirmation before starting work. Assignment requests are welcome, but work should begin only after a mentor approves and assigns the issue.'}\n\n` +
                `_VoiceForge automation_`;

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body: successBody
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body: successBody
                });
              }
              return;
            }

            const commentBody =
              `${marker}\n` +
              `## Issue Needs A Quick Update\n\n` +
              `Hi @${username}, thank you for opening this issue.\n\n` +
              `Please update these items before mentor review:\n\n` +
              problems.map(problem => `- ${problem}`).join('\n') +
              `\n\n` +
              `${templateProblems.length > 0 ? '- Template: use one complete program issue template: GSSoC, NSOC, SSOC, or ELUSOC.\n' : ''}` +
              `${qualityProblems.length > 0 ? '- Details: replace placeholders with clear context, expected behavior, useful screenshots/logs, and enough steps to review.\n' : ''}` +
              `\n` +
              `Edit the issue body with the missing details. This comment will update automatically after the workflow runs again.\n\n` +
              `_VoiceForge automation_`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: commentBody
              });
            }
