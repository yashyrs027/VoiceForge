name: Merge Violation Guard

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: merge-violation-guard-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  guard:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest

    steps:
      - name: Audit — alert if merger did not review this PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr           = context.payload.pull_request;
            const owner        = context.repo.owner;
            const repo         = context.repo.repo;
            const issue_number = pr.number;
            const prAuthor     = pr.user.login;
            const mergedBy     = pr.merged_by?.login;

            if (!mergedBy) {
              core.info('Merger identity unknown — skipping guard.');
              return;
            }

            // ─────────────────────────────────────────────────────────────
            // CONFIGURE: keep in sync with the other mentor workflow files
            // ─────────────────────────────────────────────────────────────
            const MENTORS = [
              'sabeenaviklar',
              '1754riya',
              'Anushreebasics',
              'itsdakshjain',
              'snehkris',
              'leonagoel',
              'joyprakashk',
              'rushi-k12'
            ];
            const ADMINS = ['itzzavdhesh'];
            // ─────────────────────────────────────────────────────────────

            const mergedByLower = mergedBy.toLowerCase();

            // Admins may merge freely — no violation.
            if (ADMINS.map(a => a.toLowerCase()).includes(mergedByLower)) {
              core.info(`Merged by admin @${mergedBy} — no violation.`);
              return;
            }

            // Automation bots — no violation.
            if (mergedBy === 'github-actions[bot]') {
              core.info(`Merged by automation — no violation.`);
              return;
            }

            const isMentor = MENTORS.map(m => m.toLowerCase()).includes(mergedByLower);

            // Fetch all reviews to check if the merger reviewed.
            let reviews = [];
            try {
              reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner, repo, pull_number: issue_number, per_page: 100
              });
            } catch (err) {
              core.warning(`Could not fetch reviews: ${err.message}`);
            }

            const mergerReviewed = reviews.some(
              r => r.user?.login.toLowerCase() === mergedByLower
            );

            if (mergerReviewed) {
              core.info(`@${mergedBy} reviewed before merging PR #${issue_number} — no violation.`);
              return;
            }

            // ── VIOLATION ────────────────────────────────────────────────
            const role         = isMentor ? 'mentor' : 'collaborator';
            const adminMentions = ADMINS.map(a => `@${a}`).join(' ');
            const marker       = '<!-- voiceforge-merge-violation-guard -->';

            const commentBody =
              `${marker}\n` +
              `## ❌ Merge Policy Violation\n\n` +
              `> [!CAUTION]\n` +
              `> **Unauthorized Merge** — Pull request #${issue_number} was merged by @${mergedBy} (${role}) without any review on record.\n\n` +
              `VoiceForge guidelines require contributors/mentors to submit at least one review (approval, comment, or changes requested) before merging a pull request to ensure code quality and point-tracking integrity.\n\n` +
              `### 📊 Violation Summary\n\n` +
              `| Parameter | Details |\n` +
              `|---|---|\n` +
              `| **Merged By** | @${mergedBy} (${role}) |\n` +
              `| **Review Count** | \`0\` reviews on record |\n` +
              `| **PR Author** | @${prAuthor} |\n` +
              `| **PR Number** | #${issue_number} |\n\n` +
              `⚠️ **Action Required (${adminMentions}):**\n` +
              `- Please review the merged code for quality and scope.\n` +
              `- Consider reverting the merge if it was done inappropriately.\n   - Ensure your repository ruleset or branch protection rules are active.\n\n` +
              `---\n` +
              `<sub>🤖 VoiceForge Automation</sub>`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100
            });
            const existing = comments.find(c => c.user?.type === 'Bot' && c.body?.includes(marker));

            try {
              if (existing) {
                if (existing.body.trim() !== commentBody.trim()) {
                  await github.rest.issues.updateComment({
                    owner, repo, comment_id: existing.id, body: commentBody
                  });
                }
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number, body: commentBody });
              }
            } catch (err) {
              if (err.status === 403) core.warning(`Could not post violation comment: ${err.message}`);
              else throw err;
            }

            // Mark step as failed → shows red X in Actions tab = permanent audit trail
            core.setFailed(
              `Merge violation: @${mergedBy} merged PR #${issue_number} without reviewing it.`
            );
