name: Mentor Merge Eligibility Check

# This workflow acts as a REQUIRED STATUS CHECK that prevents merging
# until at least one configured mentor has approved the PR.
#
# To activate the merge gate:
#   GitHub → Repo Settings → Branches → Edit rule for "main"
#   → Require status checks to pass before merging
#   → Search for and add: "voiceforge/mentor-approved"
#   → Save changes
#
# Once active:
#   - The merge button is locked until a mentor approves ✅
#   - Admins (itzzavdhesh) can still bypass via "Include administrators" setting OFF
#   - The status updates automatically whenever a review is submitted or dismissed

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read
  pull-requests: read
  statuses: write   # needed to post commit statuses

concurrency:
  group: mentor-eligibility-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    if: >
      (github.event_name == 'pull_request_target' && github.event.pull_request.draft == false && github.event.pull_request.user.type != 'Bot') ||
      (github.event_name == 'pull_request_review' && github.event.pull_request.user.type != 'Bot')
    runs-on: ubuntu-latest

    steps:
      - name: Evaluate mentor approval and post commit status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr           = context.payload.pull_request;
            const owner        = context.repo.owner;
            const repo         = context.repo.repo;
            const issue_number = pr.number;
            const headSha      = pr.head.sha;

            // ─────────────────────────────────────────────────────────────
            // CONFIGURE: all mentor GitHub usernames
            // Keep in sync with mentor-auto-label.yml + mentor-label-guard.yml
            // ─────────────────────────────────────────────────────────────
            const MENTORS = [
              'sabeenaviklar',
              '1754riya',
              'Anushreebasics',
              'itsdakshjain',
              'snehkris',
              'leonagoel',
              'joyprakashk',
              'rushi-k12'
            ];
            const ADMINS = ['itzzavdhesh'];

            // The status context name — this is what you add as a required check
            // in branch protection settings. Do not rename after setting it up.
            const STATUS_CONTEXT = 'voiceforge/mentor-approved';
            // ─────────────────────────────────────────────────────────────

            const mentorsLower = MENTORS.map(m => m.toLowerCase());

            // Helper: post a commit status on the PR head SHA
            async function setStatus(state, description) {
              // state: 'success' | 'failure' | 'pending'
              try {
                await github.rest.repos.createCommitStatus({
                  owner,
                  repo,
                  sha: headSha,
                  state,
                  context: STATUS_CONTEXT,
                  description
                });
                core.info(`Posted commit status: ${state} — "${description}"`);
              } catch (err) {
                core.warning(`Could not post commit status: ${err.message}`);
              }
            }

            // Set pending while we evaluate
            await setStatus('pending', 'Checking for a mentor approval…');

            // Fetch all reviews on this PR
            let reviews = [];
            try {
              reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner, repo, pull_number: issue_number, per_page: 100
              });
            } catch (err) {
              core.warning(`Could not fetch reviews: ${err.message}`);
              await setStatus('failure', 'Could not verify mentor reviews — contact admin.');
              return;
            }

            // GitHub keeps the latest review per user. Build a map: username → latest state.
            const latestReviewByUser = {};
            for (const review of reviews) {
              const login = review.user?.login?.toLowerCase();
              if (!login) continue;
              // Reviews are in chronological order; later ones overwrite earlier ones.
              latestReviewByUser[login] = review.state; // APPROVED | CHANGES_REQUESTED | COMMENTED | DISMISSED
            }

            // Check: has any mentor reviewed the PR (APPROVED, COMMENTED, or CHANGES_REQUESTED)?
            const reviewingMentors = MENTORS.filter(m => {
              const state = latestReviewByUser[m.toLowerCase()];
              return state === 'APPROVED' || state === 'COMMENTED' || state === 'CHANGES_REQUESTED';
            });

            if (reviewingMentors.length > 0) {
              const names = reviewingMentors.join(', ');
              await setStatus(
                'success',
                `Reviewed by mentor(s): ${names} — eligible to merge.`
              );
              core.info(`PR #${issue_number} has mentor review from: ${names}`);
            } else {
              await setStatus(
                'failure',
                `No mentor has reviewed this PR yet — waiting for mentor review (approve/comment/request changes) before merging.`
              );
              core.info(`PR #${issue_number} is not eligible to merge: no mentor reviews found.`);
            }

