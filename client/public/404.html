<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Page not found — VoiceForge" />
    <title>404 — VoiceForge</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg-page:   #f6f8f5;
        --bg-card:   #ffffff;
        --text-base: #16201d;
        --text-muted:#4b5563;
        --border:    rgba(22, 32, 29, 0.1);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-page:   #000000;
          --bg-card:   #080808;
          --text-base: #f5f5f5;
          --text-muted:#a3a3a3;
          --border:    rgba(255, 255, 255, 0.12);
        }
      }

      body {
        min-height: 100vh;
        background: var(--bg-page);
        color: var(--text-base);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }

      .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 3rem 2.5rem;
        max-width: 480px;
        width: 100%;
        text-align: center;
        box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      }

      .code {
        font-size: 5rem;
        font-weight: 800;
        letter-spacing: -0.05em;
        line-height: 1;
        color: var(--text-base);
        margin-bottom: 0.5rem;
      }

      .title {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
      }

      .description {
        font-size: 0.95rem;
        color: var(--text-muted);
        line-height: 1.6;
        margin-bottom: 2rem;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: #16201d;
        color: #ffffff;
        font-weight: 600;
        font-size: 0.95rem;
        padding: 0.75rem 1.75rem;
        border-radius: 0.5rem;
        text-decoration: none;
        transition: opacity 0.15s ease;
      }

      .btn:hover, 
      .btn:focus-visible { 
        opacity: 0.85; 
        outline: 2px solid #000000; 
        outline-offset: 3px; 
      }


      .btn:focus:not(:focus-visible) {
        outline: none;
      }


      @media (prefers-color-scheme: dark) {
        .btn { background: #ffffff; color: #16201d; }
      }

      .brand {
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-top: 2rem;
        font-weight: 500;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="code">404</div>
      <div class="title">Page not found</div>
      <p class="description">
        The page you're looking for doesn't exist or has been moved.<br />
        Head back to VoiceForge to continue.
      </p>
      <a href="/" class="btn">
        ← Back to VoiceForge
      </a>
      <div class="brand">VoiceForge — AI-powered voice for everyone</div>
    </div>
  </body>
</html>
